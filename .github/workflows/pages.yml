name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend
      - id: deployment
        uses: actions/deploy-pages@v4

  notify-index:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Trigger tinycrops-index regeneration
        run: |
          gh api repos/tinycrops/tinycrops-index/dispatches \
            -f event_type=site-published \
            -f client_payload[repo]=personality-compressor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
